<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="fav.png" type="image/x-icon">
    <title>Tic tac toe Game</title>
    <link rel="stylesheet" href="game.html">
 
</head>
<style>
    

   body {
    background-color: #10bda6;
    text-align: center;
}

.container {
    height: 70vh; /* Adjusted height to 90vh */
    display: flex;
    justify-content: center;
    align-items: center;
}

.game {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 20px; /* Increased gap between boxes */
    width: 300px; /* Adjusted width to 300px */
    height: 300px; /* Adjusted height to 300px */
    margin: auto;
}

.box {
    height: 100%;
    width: 100%;
    border-radius: 10px;
    border: none;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    font-size: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: white;
    color: rgb(255, 0, 0);
}

#reset-btn {
    margin-top: 20px;
    padding: 10px;
    font-size: 1.25rem;
    background-color: black;
    color: white;
    border-radius: 1rem;
    border: none;
}  

.msg-container {
    height: 100vmin;
    display: flex;
    justify-content: center;
    align-items: center; /* Center items vertically */
    flex-direction: column;
    gap: 4rem;
}

#new-btn {
    margin-top: 20px;
    padding: 10px 20px; /* Adjusted padding */
    font-size: 1.25rem;
    background-color: black;
    color: white;
    border-radius: 1rem;
    border: none;
}


#msg{
    color: white;
    font-size: 5vmin;
}


.hide{
    display: none ;
}

</style>
<body>
    <div class="msg-container hide">
        <p id="msg">Winner</p>
        <button id="new-btn">Start game</button>
    </div>
    <main>
        <h1>Tic Take Toe</h1>
        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
        <button id="reset-btn">Reset game</button>
    </main>
    <script src="game.js"></script>
</body>
</html>
